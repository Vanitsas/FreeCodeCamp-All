<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Landing Page</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header id="header">

  <img
    id="header-img"
    src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png"
    alt="logo"
  >

  <nav id="nav-bar">
    <a class="nav-link" href="#features">Features</a>
    <a class="nav-link" href="#video-section">How It Works</a>
    <a class="nav-link" href="#pricing">Pricing</a>
  </nav>

</header>


<section id="features">
  <h2>Features</h2>
  <p>Our product helps you work faster and smarter.</p>
</section>


<section id="video-section">
  <h2>How It Works</h2>

  <iframe
    id="video"
    width="560"
    height="315"
    src="https://www.youtube.com/embed/9No-FiEInLA"
    frameborder="0"
    allowfullscreen>
  </iframe>

</section>


<section id="pricing">
  <h2>Pricing</h2>
  <p>Affordable plans for everyone.</p>
</section>


<section id="subscribe">

  <h2>Subscribe</h2>

  <form id="form" action="https://www.freecodecamp.org/email-submit">

    <input
      id="email"
      name="email"
      type="email"
      placeholder="Enter your email address"
      required
    >

    <input
      id="submit"
      type="submit"
      value="Get Started"
    >

  </form>

</section>

</body>
</html>
